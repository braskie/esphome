#############################
# Template for Aukey SH-PA1 #
#############################
# Device files should look like this:
#substitutions:
#  device_name: aukey-relay-1
#  friendly_name: Aukey Relay 1
#<<: !include aukey-relay-template.yaml

# Basic Config
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}


esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome

output:
  - platform: gpio
    pin: GPIO15
    id: plug_outlet

  - platform: gpio
    pin:
      number: GPIO2
      inverted: yes
    id: blue_led_output

light:
  - platform: binary
    id: plug
    output: plug_outlet
    on_turn_on:
      - light.turn_on: blue_led
    on_turn_off:
      - light.turn_off: blue_led
  - platform: binary
    id: blue_led
    output: blue_led_output

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO13
    id: button
    on_press:
      light.toggle: plug

  - platform: status
    name: ${friendly_name} Status

status_led:
  # Red LED
  pin:
    number: GPIO0
    inverted: yes



switch:
  - platform: output
    output: plug_outlet
    name: Switch
